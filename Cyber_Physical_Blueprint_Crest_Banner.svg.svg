<svg width="1200" height="400" viewBox="0 0 1200 400" fill="none" xmlns="http://www.w3.org/2000/svg">
  
  <rect width="1200" height="400" fill="#050505"/>
  
  <defs>
    <pattern id="master-grid" width="60" height="60" patternUnits="userSpaceOnUse">
      <path d="M 60 0 L 0 0 0 60" fill="none" stroke="#111111" stroke-width="1"/>
      <path d="M 60 30 L 0 30 M 30 60 L 30 0" fill="none" stroke="#0A0A0A" stroke-width="0.5"/>
    </pattern>
  </defs>
  <rect width="1200" height="400" fill="url(#master-grid)"/>

  <rect x="0" y="0" width="1200" height="6" fill="#FFBF00"/>

  <rect x="40" y="60" width="8" height="280" fill="#1A1A1A"/>
  <rect x="40" y="100" width="8" height="140" fill="#FFBF00"/>

  <text x="70" y="100" fill="#FDFDFD" font-family="'JetBrains Mono', monospace, sans-serif" font-size="34" font-weight="bold" letter-spacing="2">CYBER-PHYSICAL INTELLIGENCE</text>
  <text x="70" y="150" fill="#FFBF00" font-family="'JetBrains Mono', monospace, sans-serif" font-size="28" font-weight="bold" letter-spacing="4">ARCHITECT'S MANUAL</text>
  <text x="70" y="190" fill="#888888" font-family="'JetBrains Mono', monospace, sans-serif" font-size="14" font-weight="bold" letter-spacing="2">ENTERPRISE AUTONOMICS // ABSOLUTE RESILIENCE</text>
  
  <text x="70" y="260" fill="#555555" font-family="'JetBrains Mono', monospace, sans-serif" font-size="12" letter-spacing="1">SOVEREIGN INDEX (Si) > 60% : MERCENARY DRIFT BLOCKED</text>
  <text x="70" y="280" fill="#555555" font-family="'JetBrains Mono', monospace, sans-serif" font-size="12" letter-spacing="1">INFRASTRUCTURE DEBT (Id) = 0 : SSoT ENFORCED</text>
  <text x="70" y="300" fill="#555555" font-family="'JetBrains Mono', monospace, sans-serif" font-size="12" letter-spacing="1">Vp = (I x M) / Fc : DUAL WEB3/WEB2.5 ECONOMY ACTIVE</text>

  <rect x="680" y="50" width="480" height="300" rx="4" stroke="#222222" stroke-width="2" fill="none"/>
  <text x="700" y="80" fill="#FDFDFD" font-family="'JetBrains Mono', monospace, sans-serif" font-size="12" font-weight="bold" letter-spacing="2">LEFT OF BOOM: SELF-HEALING ARCHITECTURE</text>

  <rect x="700" y="120" width="120" height="40" fill="#0A0A0A" stroke="#333333" stroke-width="1.5"/>
